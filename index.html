<style>
/* =====================================================================
   DESIGN TOKENS
===================================================================== */
:root{
  --navy:#15324A;
  --navy-soft:#1c3f5e;
  --blue:#1B9AAA;
  --blue-dark:#157f8c;
  --blue-soft:#e7f6f8;
  --white:#FFFFFF;
  --gray:#F5F5F5;
  --gray-line:#e6e8ec;
  --text-muted:#64748b;
  --ok:#16a34a;
  --warn:#d97706;
  --danger:#dc2626;
  --radius:14px;
  --radius-sm:9px;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06), 0 1px 1px rgba(15,23,42,.04);
  --shadow-md:0 4px 14px rgba(15,23,42,.08), 0 1px 3px rgba(15,23,42,.06);
  --shadow-lg:0 12px 32px rgba(15,23,42,.14);
  --sidebar-w:248px;
  --sidebar-w-collapsed:72px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, Helvetica, Arial, sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font);
  background:var(--gray);
  color:var(--navy);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}

/* scrollbar */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

/* =====================================================================
   APP SHELL
===================================================================== */
#app{display:flex;min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--navy) 0%, #0c1322 100%);
  color:#cbd5e1;
  flex-shrink:0;
  position:sticky;
  top:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  transition:width .25s ease;
  z-index:50;
}
.sidebar.collapsed{width:var(--sidebar-w-collapsed);}

.sidebar-head{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px 18px;
  border-bottom:1px solid rgba(255,255,255,.08);
  min-height:32px;
}
.sidebar-logo{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),#60a5fa);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:white;letter-spacing:-0.5px;
}
.sidebar-logo-img{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  object-fit:contain;background:white;padding:3px;
  box-shadow:0 0 0 1px rgba(255,255,255,.08);
}
.sidebar-title{
  font-size:13px;font-weight:700;color:white;line-height:1.2;
  white-space:nowrap;overflow:hidden;
}
.sidebar-title small{display:block;font-weight:500;color:#8ea2c5;font-size:10.5px;margin-top:2px;letter-spacing:.4px;}
.sidebar.collapsed .sidebar-title{display:none;}

.sidebar-toggle{
  margin-left:auto;background:none;border:none;color:#7e93bb;cursor:pointer;
  padding:6px;border-radius:6px;display:flex;
}
.sidebar-toggle:hover{background:rgba(255,255,255,.08);color:white;}
.sidebar.collapsed .sidebar-toggle{margin:0 auto;}

.nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:var(--radius-sm);
  font-size:13.5px;font-weight:500;color:#aebbd6;
  cursor:pointer;white-space:nowrap;overflow:hidden;
  transition:background .15s, color .15s;
  border:none;background:none;width:100%;text-align:left;
}
.nav-item .ic{width:19px;text-align:center;flex-shrink:0;font-size:15px;}
.nav-item:hover{background:rgba(255,255,255,.06);color:white;}
.nav-item.active{background:var(--blue);color:white;}
.sidebar.collapsed .nav-item span.label{display:none;}
.sidebar.collapsed .nav-item{justify-content:center;}

.sidebar-foot{
  padding:14px 18px 18px;border-top:1px solid rgba(255,255,255,.08);
  font-size:10.5px;color:#5f7396;line-height:1.5;
}
.sidebar.collapsed .sidebar-foot{display:none;}

/* ---------- MAIN ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:none;
}
.content{flex:1;padding:36px 44px 60px;max-width:1280px;width:100%;margin:0 auto;}
@media (max-width:900px){
  .content{padding:24px 18px 50px;}
  .sidebar{position:fixed;left:-100%;height:100vh;}
  .sidebar.mobile-open{left:0;}
  .sidebar.collapsed{width:var(--sidebar-w);}
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--navy);position:sticky;top:0;z-index:40;}
  .topbar button{background:none;border:none;color:white;font-size:20px;cursor:pointer;}
  .topbar .tb-title{color:white;font-weight:700;font-size:14px;}
}

/* =====================================================================
   HERO / HEADER
===================================================================== */
.hero{
  text-align:left;margin-bottom:30px;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11.5px;font-weight:700;letter-spacing:.08em;color:var(--blue);
  background:var(--blue-soft);padding:5px 12px;border-radius:99px;margin-bottom:14px;
}
.hero h1{
  font-size:30px;font-weight:800;letter-spacing:-0.02em;margin:0 0 6px;color:var(--navy);
}
.hero p.sub{font-size:15px;color:var(--text-muted);margin:0;font-weight:500;}

/* search bar */
.search-wrap{position:relative;margin:26px 0 36px;max-width:720px;}
.search-input{
  width:100%;padding:15px 18px 15px 48px;border-radius:var(--radius);
  border:1.5px solid var(--gray-line);background:white;
  font-size:14.5px;color:var(--navy);box-shadow:var(--shadow-sm);
  transition:border-color .15s, box-shadow .15s;
}
.search-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.12);}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:16px;}
.search-results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;background:white;
  border-radius:var(--radius);box-shadow:var(--shadow-lg);border:1px solid var(--gray-line);
  max-height:420px;overflow-y:auto;z-index:30;display:none;
}
.search-results.show{display:block;}
.sr-group-label{padding:10px 16px 4px;font-size:10.5px;font-weight:700;letter-spacing:.06em;color:#94a3b8;text-transform:uppercase;}
.sr-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;}
.sr-item:hover{background:var(--gray);}
.sr-item .sr-ic{width:30px;height:30px;border-radius:8px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sr-item .sr-text strong{display:block;font-size:13.5px;color:var(--navy);}
.sr-item .sr-text span{font-size:11.5px;color:var(--text-muted);}
.sr-empty{padding:24px 16px;text-align:center;color:var(--text-muted);font-size:13px;}

/* =====================================================================
   CARDS GRID (home)
===================================================================== */
.section-label{
  font-size:11.5px;font-weight:700;letter-spacing:.07em;color:#94a3b8;text-transform:uppercase;margin:0 0 14px;
}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;margin-bottom:42px;}
.card{
  background:white;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-sm);
  border:1px solid var(--gray-line);
  display:flex;flex-direction:column;gap:10px;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  cursor:pointer;position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:#d6deee;}
.card .ic-wrap{
  width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:21px;background:var(--blue-soft);color:var(--blue);margin-bottom:4px;
}
.card h3{margin:0;font-size:16px;font-weight:700;color:var(--navy);}
.card p{margin:0;font-size:13px;color:var(--text-muted);line-height:1.5;flex:1;}
.card .btn-open{
  margin-top:8px;align-self:flex-start;display:inline-flex;align-items:center;gap:6px;
  font-size:12.5px;font-weight:700;color:var(--blue);background:var(--blue-soft);
  padding:8px 14px;border-radius:99px;transition:background .15s,color .15s;
}
.card:hover .btn-open{background:var(--blue);color:white;}

/* breadcrumb */
.crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12.5px;color:var(--text-muted);margin-bottom:18px;font-weight:600;}
.crumb span.sep{color:#cbd5e1;}
.crumb a{cursor:pointer;color:var(--text-muted);}
.crumb a:hover{color:var(--blue);}
.crumb .current{color:var(--navy);}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--blue);
  cursor:pointer;margin-bottom:16px;
}
.back-btn:hover{text-decoration:underline;}

/* =====================================================================
   TEAM CARDS (documentos)
===================================================================== */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.team-card{background:white;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-line);display:flex;flex-direction:column;gap:12px;transition:box-shadow .18s, transform .18s;}
.team-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.team-top{display:flex;align-items:center;gap:14px;}
.avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#1e3a8a);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.team-name{font-size:15px;font-weight:700;color:var(--navy);margin:0;}
.team-role{font-size:12px;color:var(--text-muted);margin:2px 0 0;}
.team-meta{display:flex;flex-direction:column;gap:7px;font-size:12px;color:var(--text-muted);border-top:1px dashed var(--gray-line);padding-top:12px;}
.team-meta .row{display:flex;justify-content:space-between;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;}
.badge.ok{background:#dcfce7;color:var(--ok);}
.badge.warn{background:#fef3c7;color:var(--warn);}
.team-card .btn-full{
  margin-top:4px;text-align:center;background:var(--navy);color:white;font-weight:700;font-size:13px;
  padding:10px;border-radius:var(--radius-sm);transition:background .15s;display:block;
}
.team-card .btn-full:hover{background:var(--blue);}

/* =====================================================================
   TRAINING / LIBRARY CARDS
===================================================================== */
.train-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.train-card{background:white;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--gray-line);display:flex;flex-direction:column;transition:box-shadow .18s,transform .18s;}
.train-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.train-banner{height:88px;display:flex;align-items:center;justify-content:center;font-size:30px;color:white;position:relative;border-bottom:1px solid var(--gray-line);}
.train-body{padding:18px;display:flex;flex-direction:column;gap:8px;flex:1;}
.train-cat{font-size:10.5px;font-weight:700;letter-spacing:.05em;color:var(--blue);text-transform:uppercase;}
.train-body h3{margin:0;font-size:15px;color:var(--navy);}
.train-body p{margin:0;font-size:12.5px;color:var(--text-muted);line-height:1.5;flex:1;}
.train-body .btn-open{align-self:flex-start;}

/* manufacturer tiles */
.mfr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.mfr-card{background:white;border-radius:var(--radius);padding:26px 20px;text-align:center;box-shadow:var(--shadow-sm);border:1px solid var(--gray-line);cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;}
.mfr-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:#d6deee;}
.mfr-logo{width:50px;height:50px;border-radius:12px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;}
.mfr-card h4{margin:0;font-size:13.5px;color:var(--navy);font-weight:700;}
.mfr-card span{font-size:11px;color:var(--text-muted);}

/* report cards (simple list w/ icon) */
.report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}

/* =====================================================================
   TROUBLESHOOTING FLOW
===================================================================== */
.vessel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
.vessel-card{background:white;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-line);cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:all .18s;}
.vessel-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:#d6deee;}
.vessel-tag{display:inline-flex;align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--blue);background:var(--blue-soft);padding:3px 9px;border-radius:99px;text-transform:uppercase;}
.vessel-card h3{margin:0;font-size:16px;color:var(--navy);}
.vessel-card .eq-count{font-size:12px;color:var(--text-muted);}

.equip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.equip-card{background:white;border-radius:var(--radius-sm);padding:18px;text-align:center;box-shadow:var(--shadow-sm);border:1px solid var(--gray-line);cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.equip-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:#d6deee;}
.equip-card .ic{font-size:24px;}
.equip-card span{font-size:12.5px;font-weight:600;color:var(--navy);}

.fault-list{display:flex;flex-direction:column;gap:10px;}
.fault-row{
  display:flex;align-items:center;justify-content:space-between;gap:14px;background:white;border-radius:var(--radius-sm);
  padding:15px 18px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-line);cursor:pointer;transition:all .15s;
}
.fault-row:hover{box-shadow:var(--shadow-md);border-color:#d6deee;transform:translateX(2px);}
.fault-left{display:flex;align-items:center;gap:12px;}
.fault-dot{width:9px;height:9px;border-radius:50%;background:var(--danger);flex-shrink:0;}
.fault-row strong{font-size:13.5px;color:var(--navy);font-weight:600;}
.fault-arrow{color:var(--blue);font-size:15px;}

.fault-detail{background:white;border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--gray-line);padding:30px 32px;}
.fault-detail h2{margin:0 0 4px;font-size:21px;color:var(--navy);}
.fault-detail .fd-sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;}
.fd-block{margin-bottom:20px;}
.fd-block h4{margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--blue);}
.fd-block p, .fd-block li{font-size:13.5px;color:#334155;line-height:1.65;}
.fd-block ul{margin:0;padding-left:18px;}
.fd-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media (max-width:700px){.fd-grid{grid-template-columns:1fr;}}
.tag-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;background:var(--gray);color:#475569;padding:5px 11px;border-radius:99px;margin:0 6px 6px 0;}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:white;font-weight:700;font-size:14px;
  padding:13px 24px;border-radius:var(--radius-sm);margin-top:8px;transition:background .15s;box-shadow:var(--shadow-sm);
}
.btn-primary:hover{background:var(--blue-dark);}

/* =====================================================================
   CONFIG PAGE
===================================================================== */
.config-box{background:white;border-radius:var(--radius);border:1px solid var(--gray-line);padding:26px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
.config-box h3{margin:0 0 6px;font-size:15px;color:var(--navy);}
.config-box p{margin:0 0 14px;font-size:12.5px;color:var(--text-muted);}
.config-box textarea{
  width:100%;min-height:140px;font-family:"SF Mono",Consolas,monospace;font-size:12px;border-radius:var(--radius-sm);
  border:1px solid var(--gray-line);padding:14px;background:#0f172a;color:#a5d6ff;resize:vertical;
}
.config-box textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(27,154,170,.18);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-state .ic{font-size:38px;margin-bottom:10px;}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.content > *{animation:fadeUp .28s ease both;}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
}
</style>
</head>

===================================================================================================== */
const NAV_ITEMS = [
  { id:"home", label:"Início", icon:ICONS.home },
  { id:"documentos", label:"Documentos", icon:ICONS.docs, externalLink:"https://posidoniashipping.sharepoint.com/:f:/s/eletrica.offshore/IgD-EfupdnYJQ6b_Vk4AexFxAcjbSU4p1NMVyKpe_YabuA4?e=3wGleY" },
  { id:"treinamentos", label:"Treinamentos", icon:ICONS.train },
  { id:"relatorios", label:"Relatórios", icon:ICONS.reports },
  { id:"troubleshooting", label:"Troubleshooting", icon:ICONS.trouble },
  { id:"biblioteca", label:"Biblioteca Técnica", icon:ICONS.lib },
  { id:"config", label:"Configurações", icon:ICONS.settings },
];

let state = { route:"home", params:{} };

function navigate(route, params={}){
  state = { route, params };
  render();
  window.scrollTo({top:0,behavior:"smooth"});
  if(window.innerWidth<=900){ document.getElementById('sidebar').classList.remove('mobile-open'); }
}

function renderNav(){
  const el = document.getElementById('navList');
  el.innerHTML = NAV_ITEMS.map(item=>`
    <button class="nav-item ${state.route===item.id?'active':''}" data-route="${item.id}" ${item.externalLink?`data-external="${item.externalLink}"`:''}>
      <span class="ic">${item.icon}</span><span class="label">${item.label}</span>
    </button>`).join('');
  el.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(btn.dataset.external){
        window.open(btn.dataset.external, '_blank', 'noopener');
      } else {
        navigate(btn.dataset.route);
      }
    });
  });
}

/* =====================================================================================================
   HELPERS DE RENDERIZAÇÃO
===================================================================================================== */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function pageHeader(eyebrow, title, sub){
  return `<div class="hero">
    ${eyebrow?`<div class="hero-eyebrow">${eyebrow}</div>`:''}
    <h1>${title}</h1>
    ${sub?`<p class="sub">${sub}</p>`:''}
  </div>`;
}

function crumbHTML(parts){
  // parts: [{label, route, params}]
  return `<div class="crumb">${parts.map((p,i)=>{
    const isLast = i===parts.length-1;
    if(isLast) return `<span class="current">${p.label}</span>`;
    return `<a data-route="${p.route}" data-params='${JSON.stringify(p.params||{})}'>${p.label}</a><span class="sep">/</span>`;
  }).join('')}</div>`;
}

function bindCrumbs(container){
  container.querySelectorAll('.crumb a').forEach(a=>{
    a.addEventListener('click', ()=> navigate(a.dataset.route, JSON.parse(a.dataset.params||'{}')));
  });
}

  });

  });
  const input = document.getElementById('searchInput');
  const resultsBox = document.getElementById('searchResults');
  if(!input) return;
  input.addEventListener('input', ()=>{
    const q = input.value.trim().toLowerCase();
    if(q.length<2){ resultsBox.classList.remove('show'); resultsBox.innerHTML=''; return; }
    const results = runSearch(q);
    renderSearchResults(results, resultsBox);
  });

    if(!resultsBox.contains(e.target) && e.target!==input){ resultsBox.classList.remove('show'); }
  });
}

/* =====================================================================================================
   MOTOR DE BUSCA GLOBAL
===================================================================================================== */
function runSearch(q){
  const out = [];
  // documentos
  CONFIG.documentos.forEach(p=>{
    if(p.nome.toLowerCase().includes(q) || p.cargo.toLowerCase().includes(q)){
      out.push({group:"Documentos da Equipe", icon:"👤", label:p.nome, sub:p.cargo, action:()=>navigate('documentos')});
    }
  });
  // treinamentos
  CONFIG.treinamentos.forEach(t=>{
    if(t.nome.toLowerCase().includes(q) || t.categoria.toLowerCase().includes(q)){
      out.push({group:"Treinamentos", icon:t.icon, label:t.nome, sub:t.categoria, action:()=>navigate('treinamentos')});
    }
  });
  // relatorios
  CONFIG.relatorios.forEach(r=>{
    if(r.nome.toLowerCase().includes(q)){
      out.push({group:"Relatórios", icon:r.icon, label:r.nome, sub:"Abrir formulário Smartsheet", action:()=>navigate('relatorios')});
    }
  });
  // biblioteca
  CONFIG.biblioteca.forEach(b=>{
    if(b.nome.toLowerCase().includes(q)){
      out.push({group:"Biblioteca Técnica", icon:"📚", label:b.nome, sub:"Manuais e datasheets", action:()=>navigate('biblioteca')});
    }
  });
  // troubleshooting (embarcações, equipamentos, defeitos)
  CONFIG.troubleshooting.embarcacoes.forEach(v=>{
    if(v.nome.toLowerCase().includes(q)){
      out.push({group:"Troubleshooting", icon:"🚢", label:v.nome, sub:"Selecionar embarcação", action:()=>navigate('ts-vessel',{vesselId:v.id})});
    }
    v.equipamentos.forEach(eq=>{
      if(eq.nome.toLowerCase().includes(q)){
        out.push({group:"Troubleshooting", icon:eq.icon, label:`${eq.nome} — ${v.nome}`, sub:"Selecionar equipamento", action:()=>navigate('ts-equip',{vesselId:v.id, equipId:eq.id})});
      }
      eq.defeitos.forEach(d=>{
        if(d.nome.toLowerCase().includes(q) || d.descricao.toLowerCase().includes(q)){
          out.push({group:"Troubleshooting", icon:"⚠️", label:`${d.nome} — ${eq.nome}`, sub:v.nome, action:()=>navigate('ts-fault',{vesselId:v.id, equipId:eq.id, faultId:d.id})});
        }
      });
    });
  });
  return out.slice(0,25);
}

function renderSearchResults(results, box){
  if(results.length===0){
    box.innerHTML = `<div class="sr-empty">Nenhum resultado encontrado.</div>`;
    box.classList.add('show');
    return;
  }
  const groups = {};
  results.forEach(r=>{ (groups[r.group] = groups[r.group]||[]).push(r); });
  box.innerHTML = Object.entries(groups).map(([g, items])=>`
    <div class="sr-group-label">${g}</div>
    ${items.map((it,i)=>`<div class="sr-item" data-gi="${g}__${i}"><div class="sr-ic">${it.icon}</div><div class="sr-text"><strong>${escapeHtml(it.label)}</strong><span>${escapeHtml(it.sub)}</span></div></div>`).join('')}
  `).join('');
  box.classList.add('show');
  box.querySelectorAll('.sr-item').forEach((el,idx)=>{
    el.addEventListener('click', ()=>{
      const flat = [];
      Object.values(groups).forEach(arr=>flat.push(...arr));
      flat[idx].action();
      box.classList.remove('show');
    });
  });
}

        </h3>

      </div>`).join('')}
  `;

function bindConfig(){
  document.querySelectorAll('.copy-block-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const key = btn.dataset.key;
      const textarea = document.getElementById('cfg-'+key);
      const text = `${key}: ${textarea.value},`;
      copyToClipboard(text, btn);
    });
  });
  const allBtn = document.getElementById('copyAllBtn');
  if(allBtn){
    allBtn.addEventListener('click', ()=>{
      const parts = ['documentos','treinamentos','relatorios','biblioteca','troubleshooting'].map(key=>{
        const textarea = document.getElementById('cfg-'+key);
        return `  ${key}: ${textarea.value},`;
      });
      const text = `const CONFIG = {\n\n${parts.join('\n\n')}\n\n};`;
      copyToClipboard(text, allBtn);
    });
  }
}

function copyToClipboard(text, btn){
  const original = btn.innerHTML;
  const done = ()=>{ btn.innerHTML = '✅ Copiado!'; setTimeout(()=>{ btn.innerHTML = original; }, 1800); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  done();
}

/* =====================================================================================================
   ROTEADOR PRINCIPAL
===================================================================================================== */
function render(){
  renderNav();
  const content = document.getElementById('content');
  let html = '';
  switch(state.route){
    case 'home': html = renderHome(); break;
    case 'documentos': html = renderDocumentos(); break;
    case 'treinamentos': html = renderTreinamentos(); break;
    case 'relatorios': html = renderRelatorios(); break;
    case 'biblioteca': html = renderBiblioteca(); break;
    case 'troubleshooting': html = renderTroubleshootingHome(); break;
    case 'ts-vessel': html = renderTSVessel(state.params); break;
    case 'ts-equip': html = renderTSEquip(state.params); break;
    case 'ts-fault': html = renderTSFault(state.params); break;
    case 'config': html = renderConfig(); break;
    default: html = renderHome();
  }
  content.innerHTML = html;
  bindCrumbs(content);
  if(state.route==='home') bindHome();
  if(['troubleshooting','ts-vessel','ts-equip','ts-fault'].includes(state.route)) bindTroubleshooting();
  if(state.route==='config') bindConfig();
  if(state.route==='relatorios') bindRelatorios();
}
